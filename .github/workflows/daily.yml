name: 🇧🇷 巴西资讯日报

on:
  schedule:
    # 北京时间每天早上 7:30（UTC 23:30）
    - cron: "30 23 * * *"
  # 支持手动触发测试
  workflow_dispatch:

jobs:
  brazil-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行采集 + 发送邮件
        env:
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
        run: python main.py
