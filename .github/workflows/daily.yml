name: 🇧🇷 巴西资讯日报

on:
  schedule:
    # 北京时间每天早上 7:30（UTC 23:30 前一天）
    - cron: "30 23 * * *"
    # 备用触发：北京时间每天早上 8:05（UTC 00:05）——防止主cron延误漏发
    - cron: "5 0 * * *"
  # 支持手动触发测试
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  brazil-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 防重复检查（定时触发才检查，手动触发跳过）
        id: dedup
        if: github.event_name == 'schedule'
        run: |
          # 使用北京时间日期（UTC+8），避免UTC 23:30被误判为已发过
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          echo "Beijing today: $TODAY"
          # 将北京日期转为UTC时间范围：当天00:00 BJ = 前一天16:00 UTC；当天23:59 BJ = 当天15:59 UTC
          BJ_START="${TODAY}T00:00:00+08:00"
          BJ_END="${TODAY}T23:59:59+08:00"
          # 转换为UTC供过滤使用
          START_UTC=$(date -d "$BJ_START" -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S%z" "$BJ_START" -u +%Y-%m-%dT%H:%M:%SZ)
          END_UTC=$(date -d "$BJ_END" -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S%z" "$BJ_END" -u +%Y-%m-%dT%H:%M:%SZ)
          echo "UTC range: $START_UTC ~ $END_UTC"
          RUNS=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=30" \
            --jq "[.workflow_runs[] | select(.conclusion == \"success\" and .event == \"schedule\") | select(.created_at >= \"$START_UTC\" and .created_at <= \"$END_UTC\")] | length" 2>/dev/null || echo "0")
          echo "Beijing-day successful scheduled runs: $RUNS"
          if [ "$RUNS" -gt 0 ]; then
            echo "already_sent=true" >> $GITHUB_OUTPUT
          else
            echo "already_sent=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 设置Python
        if: steps.dedup.outputs.already_sent != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        if: steps.dedup.outputs.already_sent != 'true'
        run: pip install -r requirements.txt

      - name: 运行采集 + 发送邮件
        if: steps.dedup.outputs.already_sent != 'true'
        env:
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
        run: python main.py

      - name: 部署到 GitHub Pages（国内可访问）
        if: steps.dedup.outputs.already_sent != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./_pages
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          commit_message: "deploy: 巴西资讯日报更新"
