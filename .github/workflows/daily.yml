name: 🇧🇷 巴西资讯日报

on:
  schedule:
    # 北京时间每天早上 7:30（UTC 23:30）
    - cron: "30 23 * * *"
  # 支持手动触发测试
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  brazil-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行采集 + 发送邮件
        env:
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
        run: python main.py

      - name: 部署到 GitHub Pages（国内可访问）
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./_pages
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          commit_message: "deploy: 巴西资讯日报更新"
